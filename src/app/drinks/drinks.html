<h2 class="title">Drinks & Beverages</h2>

<div class="grid">
  <div class="card" *ngFor="let item of drinkItems">

    <img [src]="item.image">

    <div class="offer">Flat {{item.offer}}% OFF</div>

    <h3>{{item.name}}</h3>
    <p>{{item.type}}</p>

    <div class="bottom">
      <span class="rating">{{item.rating}} ⭐</span>
      <span class="price">₹{{item.price}}</span>
    </div>

  </div>
</div>
